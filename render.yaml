services:
  - type: web
    name: dice-chess
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: STOCKFISH_PATH
        value: /opt/stockfish/stockfish
    healthCheckPath: /health
